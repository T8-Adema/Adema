<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Adema/css/general.css" />
    <link rel="stylesheet" href="/Adema/css/cards.css" />
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Akshar:wght@300..700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <section class="product-section">
      <article class="product-card">
        <img src="/Adema/Billeder/DiorJadore.webp" alt="Dior J'adore" class="product-image" />

        <div class="product-info">
          <h3 class="product-title">Dior J'adore</h3>
          <p class="product-price">€69.99</p>
        </div>
      </article>

      <article class="product-card sale">
        <img src="/Adema/Billeder/DiorJadore.webp" alt="Dior J'adore" class="product-image" />

        <div class="product-info">
          <h3 class="product-title">Dior J'adore</h3>
          <p class="product-price">
            <span class="old-price">€589,00</span>
            <span class="new-price">€389,00</span>
          </p>
        </div>
      </article>

      <article class="product-card soldout">
        <span class="soldout-text">SOLD OUT</span>
        <img src="/Adema/Billeder/DiorJadore.webp" alt="Dior J'adore" class="product-image" />

        <div class="product-info">
          <h3 class="product-title">Dior J'adore</h3>
          <p class="product-price">€69.99</p>
        </div>
      </article>

      <article class="product-card soldout sale">
        <span class="soldout-text">SOLD OUT</span>
        <img src="/Adema/Billeder/DiorJadore.webp" alt="Dior J'adore" class="product-image" />

        <div class="product-info">
          <h3 class="product-title">Dior J'adore</h3>
          <p class="product-price">
            <span class="old-price">€589,00</span>
            <span class="new-price">€389,00</span>
          </p>
        </div>
      </article>
    </section>
  </body>
</html>
